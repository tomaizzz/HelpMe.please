<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HelpMe.please</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>HelpMe.please</h1>
        <p class="subtitle">organize suas tarefas sem dor de cabeça</p>

        <div class="input-area">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Digite uma tarefa..."
            >
            <button onclick="addTask()">Adicionar</button>
        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>
</body>
</html>
